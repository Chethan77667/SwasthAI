<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password • SwasthAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: { 950: "#070A0E", 900: "#0B1220", 800: "#101B2E" },
              mint: { 500: "#1EE6B6" },
              skyx: { 500: "#2FB5FF" }
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="bg-ink-950 text-white antialiased flex items-center justify-center min-h-screen p-4">
    <!-- Background -->
    <div aria-hidden="true" class="pointer-events-none fixed inset-0 -z-10">
      <div class="absolute inset-0 bg-[radial-gradient(1200px_500px_at_15%_10%,rgba(255,77,125,.1),transparent_60%)]"></div>
    </div>

    <div class="w-full max-w-md card-xl reveal animate-pop">
      <div class="text-center mb-8">
        <div class="inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-white/10 border border-white/15 mb-4 shadow-glow">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-mint-500">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <h1 class="text-2xl font-bold tracking-tight">Forgot Password</h1>
        <p class="text-white/55 text-sm mt-2">Enter your email to receive a login OTP</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="mb-4 p-3 rounded-xl border {% if category == 'danger' %}border-rose-500/50 bg-rose-500/10 text-rose-200{% else %}border-mint-500/50 bg-mint-500/10 text-mint-200{% endif %} text-xs text-center">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" class="grid gap-4">
        <div class="grid gap-2 text-sm">
          <label class="text-white/70 font-medium ml-1">Email address</label>
          <input type="email" name="email" class="input" placeholder="name@example.com" required />
        </div>
        <button type="submit" class="btn-primary w-full justify-center py-3 mt-2">Send OTP</button>
      </form>

      <div class="mt-8 pt-6 border-t border-white/10 text-center">
        <p class="text-white/55 text-sm">
          Remembered your password? 
          <a href="{{ url_for('login') }}" class="text-mint-500 hover:text-mint-300 font-medium transition">Log in</a>
        </p>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
